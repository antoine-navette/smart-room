services:
  frontend:
    image: ghcr.io/antoine-navette/smart-room-frontend:${IMAGE_TAG}
    env_file:
      - path: ./frontend/.env
        required: true
    ports:
      - "${FRONTEND_PORT}:80"
    restart: unless-stopped

  backend:
    image: ghcr.io/antoine-navette/smart-room-backend:${IMAGE_TAG}
    env_file:
      - path: ./backend/.env
        required: true
    ports:
      - "${BACKEND_PORT}:3000"
    restart: unless-stopped

  database:
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: unless-stopped
