name: PR Lifecycle (Quality, Build)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # 1. QUALITY CHECKS
  # ==========================================
  quality_backend:
    name: Backend checks (format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - run: npm ci
        working-directory: backend
      - run: npm run format:check
        working-directory: backend
      - run: npm run test:unit
        working-directory: backend

  # ==========================================
  # 2. BUILD IMAGES
  # ==========================================
  build_frontend:
    name: Build Frontend
    needs: [quality_backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u antoine-navette --password-stdin
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build & push
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ghcr.io/antoine-navette/smart-room-frontend:${{ github.event.pull_request.head.sha }} \
            -f frontend/Dockerfile \
            --push \
            ./frontend

  build_backend:
    name: Build Backend
    needs: [quality_backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u antoine-navette --password-stdin
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build & push
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ghcr.io/antoine-navette/smart-room-backend:${{ github.event.pull_request.head.sha }} \
            -f backend/Dockerfile \
            --push \
            ./backend

  # ==========================================
  # 3. DEPLOY TO STAGING
  # ==========================================
  deploy_staging:
    name: Deploy to Staging
    needs: [build_frontend, build_backend]
    runs-on: [self-hosted, smart-room]
    env:
      TARGET_PATH: /srv/apps/smart-room/staging
      IMAGE_TAG: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Checkout PR code
        run: |
          cd "$TARGET_PATH"
          git fetch
          git checkout ${{ github.event.pull_request.head.sha }}
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u antoine-navette --password-stdin
      - name: Deploy
        run: |
          cd "$TARGET_PATH"
          docker compose -f compose.yaml -f compose.prod.yaml pull
          docker compose -f compose.yaml -f compose.prod.yaml down --remove-orphans
          docker compose -f compose.yaml -f compose.prod.yaml run --rm backend npm run migrate:up
          docker compose -f compose.yaml -f compose.prod.yaml up -d
